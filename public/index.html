<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nina for Revit | Tiny tools to work faster</title>
    <meta name="description" content="A collection of tiny tools to work faster in Autodesk Revit. Quick access to commands using keyboard shortcuts, saving you clicks and time." />
    <meta name="keywords" content="Revit, Autodesk Revit, BIM tools, Revit plugins, Nina for Revit, Revit shortcuts, Francisco Possetto, BIM development" />
    <meta name="author" content="Francisco Possetto" />
    <meta name="robots" content="index, follow" />
    
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nina for Revit" />
    <meta property="og:description" content="A collection of tiny tools to work faster in Autodesk Revit. Quick access to commands using keyboard shortcuts." />
    <meta property="og:site_name" content="Nina for Revit" />

    <link id="dynamic-favicon" rel="icon" type="image/png" href="%PUBLIC_URL%/favicon-night.png" />
    <meta name="theme-color" content="#000000" />
    
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <script>
      (function() {
        var isDay = false;
        var fallbackHour = function() {
          var utcHour = new Date().getUTCHours();
          var morterosHour = (utcHour - 3 + 24) % 24;
          return morterosHour >= 7 && morterosHour < 20;
        };
        try {
          var cached = localStorage.getItem('sunriseSunset');
          if (cached) {
            var data = JSON.parse(cached);
            var now = new Date();
            var today = now.toISOString().split("T")[0];
            if (data.date === today && data.sunrise && data.sunset) {
              isDay = now > new Date(data.sunrise) && now < new Date(data.sunset);
            } else {
              isDay = fallbackHour();
            }
          } else {
            isDay = fallbackHour();
          }
        } catch(e) {
          isDay = fallbackHour();
        }
        document.body.style.backgroundColor = isDay ? 'white' : 'black';
        var fav = document.getElementById('dynamic-favicon');
        if (fav) {
          var originalHref = fav.getAttribute('href') || fav.href;
          var dayHref = originalHref.replace('favicon-night.png', 'favicon-day.png');
          var nightHref = originalHref.replace('favicon-day.png', 'favicon-night.png');
          fav.href = isDay ? dayHref : nightHref;
        }
      })();
    </script>
    <div id="root"></div>
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
      integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.min.js"
      integrity="sha384-IDwe1+LCz02ROU9k972gdyvl+AESN10+x7tBKgc9I5HFtuNz0wWnPclzo6p9vxnk"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
